<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ</title>
</head>
<body>

<form id="contactForm" action="submit.php" method="post">
  <input type="hidden" name="contaict_token" id="contaict_token">

  <p>
    <label>お名前<br>
    <input type="text" name="name" required></label>
  </p>
  <p>
    <label>メールアドレス<br>
    <input type="email" name="email" required></label>
  </p>
  <p>
    <label>お問い合わせ内容<br>
    <textarea id="body" name="body" rows="6" required></textarea></label>
  </p>
  <p>
    <button type="submit" id="submitBtn">送信する</button>
  </p>
</form>

<script>
let contaictToken = null;
let tokenExpiresAt = 0;

async function refreshToken() {
  const res = await fetch('https://api.contaict.app/v1/token?api_key=YOUR_SITE_KEY', {
    method: 'POST',
  });
  if (res.status === 429) throw new Error('rate_limited');
  if (!res.ok) throw new Error('token_error');
  const { token, expires_at } = await res.json();
  contaictToken = token;
  tokenExpiresAt = Date.parse(expires_at);
}

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    if (!contaictToken || Date.now() > tokenExpiresAt - 30000) {
      await refreshToken();
    }
    document.getElementById('contaict_token').value = contaictToken;
    e.target.submit();

  } catch (err) {
    if (err.message === 'rate_limited') {
      alert('送信が集中しています。しばらく時間をおいて再度お試しください。');
    } else {
      alert('送信できませんでした。しばらく時間をおいて再度お試しください。');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '送信する';
  }
});
</script>

</body>
</html>
